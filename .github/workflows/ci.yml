name: CI

on:
  push:
    # Production branches - always run CI on every push
    # dev-main removed to save CI minutes - validation happens via PRs instead
    branches: [main, master]
  pull_request:
    # Run CI on PRs to any of these branches (validates before merge)
    branches: [main, master, dev-main]

env:
  # Site URL - Required for Next.js build and SEO
  NEXT_PUBLIC_SITE_URL: "https://www.ryanflynn.org"
  
  # Directus URLs - Empty strings are fine (app gracefully handles missing Directus)
  # These are set to empty to ensure CI works without a database connection
  DIRECTUS_URL_SERVER_SIDE: ""
  NEXT_PUBLIC_DIRECTUS_URL: ""

# Cancel in-progress runs when a new commit is pushed to the same branch/PR
concurrency:
  group: ci-${{ github.ref }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  # Check commit messages for skip patterns
  check-commit-message:
    name: Check Commit Message
    runs-on: ubuntu-latest
    outputs:
      skip-all: ${{ steps.check.outputs.skip-all }}
      skip-lint: ${{ steps.check.outputs.skip-lint }}
      skip-tests: ${{ steps.check.outputs.skip-tests }}
      skip-e2e: ${{ steps.check.outputs.skip-e2e }}
      skip-build: ${{ steps.check.outputs.skip-build }}
      is-protected-branch: ${{ steps.check.outputs.is-protected-branch }}
      is-dev-main: ${{ steps.check.outputs.is-dev-main }}
      run-e2e: ${{ steps.check.outputs.run-e2e }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history to check commit messages
      
      - name: Check commit message for skip patterns
        id: check
        run: |
          # Determine the branch name (for push events) or base branch (for PR events)
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BRANCH="${{ github.base_ref }}"
            COMMIT_MSG="${{ github.event.pull_request.title }} ${{ github.event.pull_request.body }}"
          else
            BRANCH="${{ github.ref_name }}"
            COMMIT_MSG=$(git log -1 --pretty=%B)
          fi
          
          # Check if this is a protected branch (main or master)
          if [ "$BRANCH" == "main" ] || [ "$BRANCH" == "master" ]; then
            echo "is-protected-branch=true" >> $GITHUB_OUTPUT
            echo "is-dev-main=false" >> $GITHUB_OUTPUT
            echo "✅ Protected branch detected: $BRANCH - E2E tests will always run"
          elif [ "$BRANCH" == "dev-main" ]; then
            echo "is-protected-branch=false" >> $GITHUB_OUTPUT
            echo "is-dev-main=true" >> $GITHUB_OUTPUT
            echo "ℹ️ dev-main branch detected - E2E tests are opt-in (use [run e2e] to enable)"
          else
            echo "is-protected-branch=false" >> $GITHUB_OUTPUT
            echo "is-dev-main=false" >> $GITHUB_OUTPUT
            echo "ℹ️ Non-protected branch: $BRANCH - E2E tests run by default"
          fi
          
          # Convert to uppercase for case-insensitive matching
          COMMIT_MSG_UPPER=$(echo "$COMMIT_MSG" | tr '[:lower:]' '[:upper:]')
          
          # Check for skip patterns
          if echo "$COMMIT_MSG_UPPER" | grep -qE '\[SKIP CI\]|\[CI SKIP\]'; then
            echo "skip-all=true" >> $GITHUB_OUTPUT
            echo "⚠️ Skipping entire CI pipeline due to [skip ci] in commit message"
          else
            echo "skip-all=false" >> $GITHUB_OUTPUT
          fi
          
          if echo "$COMMIT_MSG_UPPER" | grep -qE '\[SKIP LINT\]|\[SKIP TYPE-CHECK\]'; then
            echo "skip-lint=true" >> $GITHUB_OUTPUT
            echo "⚠️ Skipping lint & type-check job due to [skip lint] in commit message"
          else
            echo "skip-lint=false" >> $GITHUB_OUTPUT
          fi
          
          if echo "$COMMIT_MSG_UPPER" | grep -qE '\[SKIP TESTS\]|\[SKIP UNIT-TESTS\]'; then
            echo "skip-tests=true" >> $GITHUB_OUTPUT
            echo "⚠️ Skipping unit tests job due to [skip tests] in commit message"
          else
            echo "skip-tests=false" >> $GITHUB_OUTPUT
          fi
          
          # Check for opt-in pattern [run e2e] or [e2e]
          if echo "$COMMIT_MSG_UPPER" | grep -qE '\[RUN E2E\]|\[E2E\]'; then
            echo "run-e2e=true" >> $GITHUB_OUTPUT
            echo "✅ Opt-in pattern detected: E2E tests will run"
          else
            echo "run-e2e=false" >> $GITHUB_OUTPUT
          fi
          
          # For E2E: Logic depends on branch type
          # Protected branches (main/master): Always run E2E (ignore all patterns)
          # dev-main: Only run if opt-in pattern [run e2e] is present
          # Other branches: Run by default, but can be skipped with [skip e2e]
          if [ "$BRANCH" == "main" ] || [ "$BRANCH" == "master" ]; then
            # Protected branch: Always run E2E (ignore all patterns)
            echo "skip-e2e=false" >> $GITHUB_OUTPUT
            echo "✅ Protected branch: E2E tests will run regardless of patterns"
          elif [ "$BRANCH" == "dev-main" ]; then
            # dev-main: Opt-in only (check for [run e2e] pattern)
            if echo "$COMMIT_MSG_UPPER" | grep -qE '\[RUN E2E\]|\[E2E\]'; then
              echo "skip-e2e=false" >> $GITHUB_OUTPUT
              echo "✅ dev-main: E2E tests will run (opt-in pattern detected)"
            else
              echo "skip-e2e=true" >> $GITHUB_OUTPUT
              echo "ℹ️ dev-main: E2E tests skipped by default (use [run e2e] to enable)"
            fi
          elif echo "$COMMIT_MSG_UPPER" | grep -qE '\[SKIP E2E\]|\[SKIP E2E-TESTS\]'; then
            # Other branches: Can be skipped with [skip e2e]
            echo "skip-e2e=true" >> $GITHUB_OUTPUT
            echo "⚠️ Skipping E2E tests job due to [skip e2e] in commit message"
          else
            # Other branches: Run by default
            echo "skip-e2e=false" >> $GITHUB_OUTPUT
          fi
          
          if echo "$COMMIT_MSG_UPPER" | grep -qE '\[SKIP BUILD\]'; then
            echo "skip-build=true" >> $GITHUB_OUTPUT
            echo "⚠️ Skipping build job due to [skip build] in commit message"
          else
            echo "skip-build=false" >> $GITHUB_OUTPUT
          fi

  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    needs: check-commit-message
    if: needs.check-commit-message.outputs.skip-all != 'true' && needs.check-commit-message.outputs.skip-lint != 'true'
    env:
      NODE_ENV: "test"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Prettier check
        run: pnpm run lint

      - name: Run ESLint
        run: pnpm run eslint

      - name: Run TypeScript type check
        run: pnpm run type-check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    # Run after type check passes, in parallel with e2e tests
    needs: [check-commit-message, lint-and-typecheck]
    if: needs.check-commit-message.outputs.skip-all != 'true' && needs.check-commit-message.outputs.skip-tests != 'true'
    env:
      NODE_ENV: "test"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm run test:coverage

      - name: Verify coverage report exists
        if: always()
        run: |
          echo "Checking for coverage files..."
          if [ ! -d "output/coverage" ]; then
            echo "⚠️ Coverage directory not found!"
            echo "Creating output/coverage directory..."
            mkdir -p output/coverage
          fi
          
          echo "Contents of output/coverage/:"
          ls -la output/coverage/ || echo "Directory is empty or doesn't exist"
          
          if [ -f "output/coverage/coverage-summary.json" ]; then
            echo "✅ Coverage report found at output/coverage/coverage-summary.json"
            echo "File size: $(wc -c < output/coverage/coverage-summary.json) bytes"
            echo "First 20 lines of coverage-summary.json:"
            head -20 output/coverage/coverage-summary.json || true
          else
            echo "⚠️ coverage-summary.json not found, checking for other coverage files..."
            find output/coverage -type f -name "*.json" || echo "No JSON files found"
            
            # Check for coverage-final.json
            if [ -f "output/coverage/coverage-final.json" ]; then
              echo "Found coverage-final.json, showing structure:"
              echo "File size: $(wc -c < output/coverage/coverage-final.json) bytes"
              echo "First file key in coverage-final.json:"
              node -e "const cov = require('./output/coverage/coverage-final.json'); const keys = Object.keys(cov); console.log('Keys:', keys.slice(0, 5)); if (keys.length > 0) { const firstFile = cov[keys[0]]; console.log('First file structure:', Object.keys(firstFile)); console.log('Has s array:', Array.isArray(firstFile.s)); }" || true
            fi
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: output/coverage/
          retention-days: 7
          if-no-files-found: warn

      # Codecov is optional - only uploads if CODECOV_TOKEN secret is set
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: output/coverage/coverage-summary.json
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    # Run after type check, unit tests, and coverage check pass
    # This ensures e2e tests don't run if unit tests or coverage fail
    needs: [check-commit-message, lint-and-typecheck, unit-tests, coverage-check]
    # Always run on protected branches (main/master), otherwise respect skip pattern
    if: needs.check-commit-message.outputs.skip-all != 'true' && (needs.check-commit-message.outputs.is-protected-branch == 'true' || needs.check-commit-message.outputs.skip-e2e != 'true')
    env:
      NODE_ENV: "test"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Run E2E tests
        run: pnpm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  coverage-check:
    name: Coverage Check
    runs-on: ubuntu-latest
    # Always run, but only check coverage on PRs to main/master or merges to main/master
    needs: [check-commit-message, unit-tests]
    if: needs.check-commit-message.outputs.skip-all != 'true' && needs.check-commit-message.outputs.skip-tests != 'true'
    steps:
      - name: Determine if coverage check is required
        id: should-check
        run: |
          # Check if this is a PR to main/master or a merge to main/master
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            if [ "${{ github.base_ref }}" == "main" ] || [ "${{ github.base_ref }}" == "master" ]; then
              echo "should-check=true" >> $GITHUB_OUTPUT
              echo "✅ Coverage check required: PR to ${{ github.base_ref }}"
            else
              echo "should-check=false" >> $GITHUB_OUTPUT
              echo "ℹ️ Coverage check skipped: PR to ${{ github.base_ref }} (not main/master)"
            fi
          elif [ "${{ github.event_name }}" == "push" ]; then
            if [ "${{ github.ref }}" == "refs/heads/main" ] || [ "${{ github.ref }}" == "refs/heads/master" ]; then
              echo "should-check=true" >> $GITHUB_OUTPUT
              echo "✅ Coverage check required: Merge to ${{ github.ref_name }}"
            else
              echo "should-check=false" >> $GITHUB_OUTPUT
              echo "ℹ️ Coverage check skipped: Push to ${{ github.ref_name }} (not main/master)"
            fi
          else
            echo "should-check=false" >> $GITHUB_OUTPUT
            echo "ℹ️ Coverage check skipped: Event type ${{ github.event_name }}"
          fi

      - name: Download coverage artifact
        if: steps.should-check.outputs.should-check == 'true'
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: ./
          fail-on-error: false

      - name: Verify coverage file exists
        if: steps.should-check.outputs.should-check == 'true'
        run: |
          echo "Checking for coverage file after download..."
          echo "Current directory: $(pwd)"
          mkdir -p output/coverage
          
          # Check for coverage-summary.json (Vitest format) in multiple locations
          if [ -f "output/coverage/coverage-summary.json" ]; then
            echo "✅ Found coverage-summary.json at output/coverage/coverage-summary.json"
            COVERAGE_FILE="output/coverage/coverage-summary.json"
          elif [ -f "coverage-report/coverage-summary.json" ]; then
            echo "✅ Found coverage-summary.json at coverage-report/coverage-summary.json"
            cp coverage-report/coverage-summary.json output/coverage/
            COVERAGE_FILE="output/coverage/coverage-summary.json"
          elif [ -f "coverage-summary.json" ]; then
            echo "✅ Found coverage-summary.json at root"
            cp coverage-summary.json output/coverage/
            COVERAGE_FILE="output/coverage/coverage-summary.json"
          # Check for coverage-final.json (Istanbul format) and convert it
          elif [ -f "coverage-final.json" ]; then
            echo "⚠️ Found coverage-final.json (Istanbul format), converting to coverage-summary.json..."
            node -e "
              const fs = require('fs');
              const cov = require('./coverage-final.json');
              
              console.log('Coverage-final.json keys:', Object.keys(cov).slice(0, 5));
              console.log('Total files:', Object.keys(cov).length);
              
              let statements = { total: 0, covered: 0 };
              let branches = { total: 0, covered: 0 };
              let functions = { total: 0, covered: 0 };
              let lines = { total: 0, covered: 0 };
              
              let processedFiles = 0;
              Object.values(cov).forEach((file, idx) => {
                if (file && typeof file === 'object') {
                  // Istanbul format: s, b, f, l are arrays
                  // Each element: 0 = not covered, >0 = covered (number indicates how many times covered)
                  const s = Array.isArray(file.s) ? file.s : [];
                  const b = Array.isArray(file.b) ? file.b : [];
                  const f = Array.isArray(file.f) ? file.f : [];
                  const l = Array.isArray(file.l) ? file.l : [];
                  
                  if (s.length > 0 || b.length > 0 || f.length > 0 || l.length > 0) {
                    processedFiles++;
                    if (processedFiles <= 3) {
                      console.log(\`File \${idx}: s=\${s.length}, b=\${b.length}, f=\${f.length}, l=\${l.length}\`);
                    }
                  }
                  
                  statements.total += s.length;
                  statements.covered += s.filter(v => v !== undefined && v !== null && v > 0).length;
                  branches.total += b.length;
                  branches.covered += b.filter(v => v !== undefined && v !== null && v > 0).length;
                  functions.total += f.length;
                  functions.covered += f.filter(v => v !== undefined && v !== null && v > 0).length;
                  lines.total += l.length;
                  lines.covered += l.filter(v => v !== undefined && v !== null && v > 0).length;
                }
              });
              
              console.log(\`Processed \${processedFiles} files with coverage data\`);
              console.log(\`Statements: \${statements.covered}/\${statements.total}\`);
              console.log(\`Branches: \${branches.covered}/\${branches.total}\`);
              console.log(\`Functions: \${functions.covered}/\${functions.total}\`);
              console.log(\`Lines: \${lines.covered}/\${lines.total}\`);
              
              const summary = {
                total: {
                  statements: {
                    total: statements.total,
                    covered: statements.covered,
                    skipped: 0,
                    pct: statements.total > 0 ? parseFloat((statements.covered / statements.total * 100).toFixed(2)) : 0
                  },
                  branches: {
                    total: branches.total,
                    covered: branches.covered,
                    skipped: 0,
                    pct: branches.total > 0 ? parseFloat((branches.covered / branches.total * 100).toFixed(2)) : 0
                  },
                  functions: {
                    total: functions.total,
                    covered: functions.covered,
                    skipped: 0,
                    pct: functions.total > 0 ? parseFloat((functions.covered / functions.total * 100).toFixed(2)) : 0
                  },
                  lines: {
                    total: lines.total,
                    covered: lines.covered,
                    skipped: 0,
                    pct: lines.total > 0 ? parseFloat((lines.covered / lines.total * 100).toFixed(2)) : 0
                  }
                }
              };
              
              fs.writeFileSync('output/coverage/coverage-summary.json', JSON.stringify(summary, null, 2));
              console.log('✅ Converted coverage-final.json to coverage-summary.json');
              console.log('Lines coverage:', summary.total.lines.pct + '%');
            "
            COVERAGE_FILE="output/coverage/coverage-summary.json"
          elif [ -f "output/coverage/coverage-final.json" ]; then
            echo "⚠️ Found coverage-final.json in output/coverage, converting..."
            node -e "
              const fs = require('fs');
              const cov = require('./output/coverage/coverage-final.json');
              
              console.log('Coverage-final.json keys:', Object.keys(cov).slice(0, 5));
              console.log('Total files:', Object.keys(cov).length);
              
              let statements = { total: 0, covered: 0 };
              let branches = { total: 0, covered: 0 };
              let functions = { total: 0, covered: 0 };
              let lines = { total: 0, covered: 0 };
              
              let processedFiles = 0;
              Object.values(cov).forEach((file, idx) => {
                if (file && typeof file === 'object') {
                  const s = Array.isArray(file.s) ? file.s : [];
                  const b = Array.isArray(file.b) ? file.b : [];
                  const f = Array.isArray(file.f) ? file.f : [];
                  const l = Array.isArray(file.l) ? file.l : [];
                  
                  if (s.length > 0 || b.length > 0 || f.length > 0 || l.length > 0) {
                    processedFiles++;
                    if (processedFiles <= 3) {
                      console.log(\`File \${idx}: s=\${s.length}, b=\${b.length}, f=\${f.length}, l=\${l.length}\`);
                    }
                  }
                  
                  statements.total += s.length;
                  statements.covered += s.filter(v => v !== undefined && v !== null && v > 0).length;
                  branches.total += b.length;
                  branches.covered += b.filter(v => v !== undefined && v !== null && v > 0).length;
                  functions.total += f.length;
                  functions.covered += f.filter(v => v !== undefined && v !== null && v > 0).length;
                  lines.total += l.length;
                  lines.covered += l.filter(v => v !== undefined && v !== null && v > 0).length;
                }
              });
              
              console.log(\`Processed \${processedFiles} files with coverage data\`);
              console.log(\`Statements: \${statements.covered}/\${statements.total}\`);
              console.log(\`Branches: \${branches.covered}/\${branches.total}\`);
              console.log(\`Functions: \${functions.covered}/\${functions.total}\`);
              console.log(\`Lines: \${lines.covered}/\${lines.total}\`);
              
              const summary = {
                total: {
                  statements: {
                    total: statements.total,
                    covered: statements.covered,
                    skipped: 0,
                    pct: statements.total > 0 ? parseFloat((statements.covered / statements.total * 100).toFixed(2)) : 0
                  },
                  branches: {
                    total: branches.total,
                    covered: branches.covered,
                    skipped: 0,
                    pct: branches.total > 0 ? parseFloat((branches.covered / branches.total * 100).toFixed(2)) : 0
                  },
                  functions: {
                    total: functions.total,
                    covered: functions.covered,
                    skipped: 0,
                    pct: functions.total > 0 ? parseFloat((functions.covered / functions.total * 100).toFixed(2)) : 0
                  },
                  lines: {
                    total: lines.total,
                    covered: lines.covered,
                    skipped: 0,
                    pct: lines.total > 0 ? parseFloat((lines.covered / lines.total * 100).toFixed(2)) : 0
                  }
                }
              };
              
              fs.writeFileSync('output/coverage/coverage-summary.json', JSON.stringify(summary, null, 2));
              console.log('✅ Converted coverage-final.json to coverage-summary.json');
              console.log('Lines coverage:', summary.total.lines.pct + '%');
            "
            COVERAGE_FILE="output/coverage/coverage-summary.json"
          else
            echo "❌ Coverage report not found!"
            echo "Searching for coverage files..."
            find . -name "coverage*.json" | head -10 || echo "No coverage JSON files found"
            echo ""
            echo "Directory structure:"
            ls -la . | head -20 || true
            exit 1
          fi
          
          echo "Using coverage file: $COVERAGE_FILE"
          echo "File exists: $([ -f "$COVERAGE_FILE" ] && echo 'yes' || echo 'no')"

      - name: Check coverage threshold (60%)
        if: steps.should-check.outputs.should-check == 'true'
        run: |
          COVERAGE_FILE="output/coverage/coverage-summary.json"
          
          if [ ! -f "$COVERAGE_FILE" ]; then
            echo "❌ Coverage file not found at $COVERAGE_FILE"
            exit 1
          fi
          
          # Debug: Show file structure
          echo "=== Coverage file structure (first 50 lines) ==="
          head -50 "$COVERAGE_FILE" || cat "$COVERAGE_FILE"
          echo ""
          
          # Extract coverage percentage and check threshold using Node.js
          node -e "
            const fs = require('fs');
            const cov = JSON.parse(fs.readFileSync('$COVERAGE_FILE', 'utf8'));
            
            // Debug: Show what we're reading
            console.log('Coverage object keys:', Object.keys(cov));
            if (cov.total) {
              console.log('Total keys:', Object.keys(cov.total));
              console.log('Lines object:', JSON.stringify(cov.total.lines, null, 2));
            } else {
              console.log('⚠️ No total property found! Full structure:');
              console.log(JSON.stringify(cov, null, 2).substring(0, 500));
            }
            
            const coverage = cov.total?.lines?.pct ?? 0;
            const threshold = 60;
            
            if (coverage < threshold) {
              console.error('❌ Coverage is ' + coverage + '%, but minimum is ' + threshold + '%');
              console.error('Please add more tests to increase coverage.');
              process.exit(1);
            }
            
            console.log('✅ Coverage is ' + coverage + '% (minimum: ' + threshold + '%)');
          "
          
          # Also show other metrics
          STATEMENTS=$(node -e "const cov = require('./$COVERAGE_FILE'); console.log(cov.total?.statements?.pct ?? 0)")
          BRANCHES=$(node -e "const cov = require('./$COVERAGE_FILE'); console.log(cov.total?.branches?.pct ?? 0)")
          FUNCTIONS=$(node -e "const cov = require('./$COVERAGE_FILE'); console.log(cov.total?.functions?.pct ?? 0)")
          COVERAGE=$(node -e "const cov = require('./$COVERAGE_FILE'); console.log(cov.total?.lines?.pct ?? 0)")
          
          echo ""
          echo "Coverage Breakdown:"
          echo "  Statements: ${STATEMENTS}%"
          echo "  Branches: ${BRANCHES}%"
          echo "  Functions: ${FUNCTIONS}%"
          echo "  Lines: ${COVERAGE}%"

      - name: Skip coverage check
        if: steps.should-check.outputs.should-check != 'true'
        run: |
          echo "ℹ️ Coverage check skipped for this branch/event"

  build:
    name: Build
    runs-on: ubuntu-latest
    # Build depends on type check, all test jobs (unit, e2e), and coverage check
    # e2e-tests now depends on coverage-check, so e2e won't run if unit tests or coverage fail
    # coverage-check only runs on PRs to main/master or merges to main/master
    needs: [check-commit-message, lint-and-typecheck, unit-tests, e2e-tests, coverage-check]
    # Build on production branches (main/master) or on PRs (to validate before merge)
    # Skip if commit message contains [skip build] or [skip ci]
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'pull_request') &&
      needs.check-commit-message.outputs.skip-all != 'true' &&
      needs.check-commit-message.outputs.skip-build != 'true'
    env:
      NODE_ENV: "production"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify TypeScript is installed
        run: pnpm exec tsc --version || (echo "TypeScript not found!" && pnpm list typescript && exit 1)

      - name: Build application
        run: pnpm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-artifacts
          path: .next/
          retention-days: 1
