name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      run_e2e:
        description: Run E2E tests
        required: false
        default: true
        type: boolean

# Least-privilege token for all jobs (no job needs write access)
permissions:
  contents: read

env:
  # Site URL - Required for Next.js build and SEO
  NEXT_PUBLIC_SITE_URL: "https://www.ryanflynn.org"

  # Directus URLs - Empty strings are fine (app gracefully handles missing Directus)
  # These are set to empty to ensure CI works without a database connection
  DIRECTUS_URL_SERVER_SIDE: ""
  NEXT_PUBLIC_DIRECTUS_URL: ""

jobs:
  # Check commit messages for skip patterns
  check-commit-message:
    name: Check Commit Message
    runs-on: ubuntu-latest
    outputs:
      skip-all: ${{ steps.check.outputs.skip-all }}
      skip-lint: ${{ steps.check.outputs.skip-lint }}
      skip-tests: ${{ steps.check.outputs.skip-tests }}
      skip-e2e: ${{ steps.check.outputs.skip-e2e }}
      skip-build: ${{ steps.check.outputs.skip-build }}
      is-protected-branch: ${{ steps.check.outputs.is-protected-branch }}
      run-e2e: ${{ steps.check.outputs.run-e2e }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch full history to check commit messages

      - name: Check commit message for skip patterns
        id: check
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Determine the branch name (for push events) or base branch (for PR events)
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BRANCH="${{ github.base_ref }}"
            # Use env vars so PR markdown (parentheses, quotes, etc.) cannot break bash
            COMMIT_MSG="${PR_TITLE} ${PR_BODY}"
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            BRANCH="${{ github.ref_name }}"
            COMMIT_MSG=$(git log -1 --pretty=%B)
          else
            BRANCH="${{ github.ref_name }}"
            COMMIT_MSG=$(git log -1 --pretty=%B)
          fi

          # Check if this is a protected branch (main or master)
          if [ "$BRANCH" == "main" ] || [ "$BRANCH" == "master" ]; then
            echo "is-protected-branch=true" >> $GITHUB_OUTPUT
            echo "✅ Protected branch detected: $BRANCH - E2E tests will always run"
          else
            echo "is-protected-branch=false" >> $GITHUB_OUTPUT
            echo "ℹ️ Branch: $BRANCH"
          fi

          # Convert to uppercase for case-insensitive matching
          COMMIT_MSG_UPPER=$(echo "$COMMIT_MSG" | tr '[:lower:]' '[:upper:]')

          # Check for skip patterns
          # SECURITY: skip patterns are ignored on protected branches so that
          # nothing can reach main/master without the full pipeline running.
          if [ "$BRANCH" == "main" ] || [ "$BRANCH" == "master" ]; then
            echo "skip-all=false" >> $GITHUB_OUTPUT
            echo "✅ Protected branch: skip patterns are ignored"
          elif echo "$COMMIT_MSG_UPPER" | grep -qE '\[SKIP CI\]|\[CI SKIP\]'; then
            echo "skip-all=true" >> $GITHUB_OUTPUT
            echo "⚠️ Skipping entire CI pipeline due to [skip ci] in commit message"
          else
            echo "skip-all=false" >> $GITHUB_OUTPUT
          fi

          if echo "$COMMIT_MSG_UPPER" | grep -qE '\[SKIP LINT\]|\[SKIP TYPE-CHECK\]'; then
            echo "skip-lint=true" >> $GITHUB_OUTPUT
            echo "⚠️ Skipping lint & type-check job due to [skip lint] in commit message"
          else
            echo "skip-lint=false" >> $GITHUB_OUTPUT
          fi

          if echo "$COMMIT_MSG_UPPER" | grep -qE '\[SKIP TESTS\]|\[SKIP UNIT-TESTS\]'; then
            echo "skip-tests=true" >> $GITHUB_OUTPUT
            echo "⚠️ Skipping unit tests job due to [skip tests] in commit message"
          else
            echo "skip-tests=false" >> $GITHUB_OUTPUT
          fi

          # Check for opt-in pattern [run e2e] or [e2e]
          if echo "$COMMIT_MSG_UPPER" | grep -qE '\[RUN E2E\]|\[E2E\]'; then
            echo "run-e2e=true" >> $GITHUB_OUTPUT
            echo "✅ Opt-in pattern detected: E2E tests will run"
          else
            echo "run-e2e=false" >> $GITHUB_OUTPUT
          fi

          # For E2E: Logic depends on branch type and trigger
          # main/master (push or PR): Always run E2E
          # workflow_dispatch: Controlled by run_e2e input (default: true)
          # Other branches (manual only): Respect skip patterns
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.run_e2e }}" == "true" ]; then
              echo "skip-e2e=false" >> $GITHUB_OUTPUT
              echo "✅ Manual run: E2E tests enabled"
            else
              echo "skip-e2e=true" >> $GITHUB_OUTPUT
              echo "ℹ️ Manual run: E2E tests disabled via input"
            fi
          elif [ "$BRANCH" == "main" ] || [ "$BRANCH" == "master" ]; then
            echo "skip-e2e=false" >> $GITHUB_OUTPUT
            echo "✅ Protected branch: E2E tests will run regardless of patterns"
          elif echo "$COMMIT_MSG_UPPER" | grep -qE '\[SKIP E2E\]|\[SKIP E2E-TESTS\]'; then
            echo "skip-e2e=true" >> $GITHUB_OUTPUT
            echo "⚠️ Skipping E2E tests job due to [skip e2e] in commit message"
          else
            echo "skip-e2e=false" >> $GITHUB_OUTPUT
          fi

          if echo "$COMMIT_MSG_UPPER" | grep -qE '\[SKIP BUILD\]'; then
            echo "skip-build=true" >> $GITHUB_OUTPUT
            echo "⚠️ Skipping build job due to [skip build] in commit message"
          else
            echo "skip-build=false" >> $GITHUB_OUTPUT
          fi

  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    needs: check-commit-message
    if: needs.check-commit-message.outputs.skip-all != 'true' && needs.check-commit-message.outputs.skip-lint != 'true'
    env:
      NODE_ENV: "test"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Prettier check
        run: pnpm run lint

      - name: Run ESLint
        run: pnpm run eslint

      - name: Run TypeScript type check
        run: pnpm run type-check

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: check-commit-message
    if: needs.check-commit-message.outputs.skip-all != 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      # Production dependencies must have no known vulnerabilities of any
      # severity; dev dependencies are allowed below the high threshold.
      - name: Audit production dependencies
        run: pnpm audit --prod

      - name: Audit all dependencies (high+)
        run: pnpm audit --audit-level=high

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: check-commit-message
    if: needs.check-commit-message.outputs.skip-all != 'true' && needs.check-commit-message.outputs.skip-tests != 'true'
    env:
      NODE_ENV: "test"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm run test

      # Codecov is optional - only uploads if CODECOV_TOKEN secret is set
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  e2e-tests:
    name: E2E Tests (Shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    runs-on: ubuntu-latest
    needs: [check-commit-message, build]
    # Always run on protected branches (main/master), otherwise respect skip pattern
    if: needs.check-commit-message.outputs.skip-all != 'true' && (needs.check-commit-message.outputs.is-protected-branch == 'true' || needs.check-commit-message.outputs.skip-e2e != 'true')
    container:
      image: mcr.microsoft.com/playwright:v1.57.0-jammy
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    env:
      NODE_ENV: "test"
      HOME: /root
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .next/

      - name: Install Playwright Browsers
        run: pnpm exec playwright install

      - name: Run E2E tests
        run: pnpm run test:e2e --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      - name: Upload Playwright blob report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-blob-${{ matrix.shardIndex }}
          path: blob-report/
          retention-days: 1

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: check-commit-message
    if: needs.check-commit-message.outputs.skip-all != 'true' && needs.check-commit-message.outputs.skip-build != 'true'
    env:
      NODE_ENV: "production"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify TypeScript is installed
        run: pnpm exec tsc --version || (echo "TypeScript not found!" && pnpm list typescript && exit 1)

      - name: Build application
        run: pnpm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: .next/
          retention-days: 1
          include-hidden-files: true

  merge-reports:
    name: Merge Playwright Reports
    runs-on: ubuntu-latest
    needs: [check-commit-message, e2e-tests]
    if: >-
      needs.check-commit-message.result == 'success' &&
      needs.check-commit-message.outputs.skip-all != 'true' &&
      (needs.check-commit-message.outputs.is-protected-branch == 'true' ||
       needs.check-commit-message.outputs.skip-e2e != 'true') &&
      needs.e2e-tests.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download all Playwright blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: playwright-blob-*
          path: all-blob-reports
          merge-multiple: true

      - name: Merge reports into HTML
        run: pnpm exec playwright merge-reports --reporter=html,list ./all-blob-reports

      - name: Upload merged Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
