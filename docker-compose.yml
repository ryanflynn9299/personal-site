version: '3.9'

services:
  # 1. Frontend Service (Next.js)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - NEXT_PUBLIC_DIRECTUS_URL=${HTTP_DOMAIN_NAME} # Use public URL for client-side
    networks:
      - backend-net
    depends_on:
      - backend

  # 2. Backend Service (Directus)
  backend:
    image: directus/directus:latest
    restart: always
    ports:
      - "8055:8055"
    volumes:
      - ./uploads:/directus/uploads
    environment:
      - KEY=${DIRECTUS_KEY}
      - SECRET=${DIRECTUS_SECRET}
      - DB_CLIENT=pg
      - DB_HOST=database
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD} # Change this
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PW} # Change this
      - WEBSOCKETS_ENABLED=true
      - PUBLIC_URL=${HTTP_DOMAIN_NAME} 
    networks:
      - backend-net
    depends_on:
      - database

  # 3. Database Service (PostgreSQL)
  database:
    image: postgres:15
    restart: always
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD} # Must match backend DB_PASSWORD
    networks:
      - backend-net

  # 4. Reverse Proxy (Nginx)
  # proxy:
  #   image: nginx:latest
  #   restart: always
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - /etc/letsencrypt:/etc/letsencrypt:ro # Uncomment for SSL
  #   networks:
  #     - app-network
  #   depends_on:
  #     - frontend
  #     - backend

networks:
  backend-net:
    external: true

volumes:
  db-data:

