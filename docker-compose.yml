version: '3.8'

services:
  # 1. Frontend Service (Next.js)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - NEXT_PUBLIC_DIRECTUS_URL=http://your-domain.com # Use public URL for client-side
    networks:
      - app-network
    depends_on:
      - backend

  # 2. Backend Service (Directus)
  backend:
    image: directus/directus:latest
    restart: always
    ports:
      - "8055:8055"
    volumes:
      - ./uploads:/directus/uploads
    environment:
      - KEY=your-strong-random-key # Change this
      - SECRET=your-strong-random-secret # Change this
      - DB_CLIENT=pg
      - DB_HOST=database
      - DB_PORT=5432
      - DB_DATABASE=directus
      - DB_USER=directus
      - DB_PASSWORD=your-secure-db-password # Change this
      - ADMIN_EMAIL=admin@example.com
      - ADMIN_PASSWORD=your-secure-admin-password # Change this
      - WEBSOCKETS_ENABLED=true
      - PUBLIC_URL=http://your-domain.com # Change this
    networks:
      - app-network
    depends_on:
      - database

  # 3. Database Service (PostgreSQL)
  database:
    image: postgres:15
    restart: always
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=directus
      - POSTGRES_USER=directus
      - POSTGRES_PASSWORD=your-secure-db-password # Must match backend DB_PASSWORD
    networks:
      - app-network

  # 4. Reverse Proxy (Nginx)
  proxy:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    # - /etc/letsencrypt:/etc/letsencrypt:ro # Uncomment for SSL
    networks:
      - app-network
    depends_on:
      - frontend
      - backend

networks:
  app-network:
    driver: bridge

volumes:
  db-data: