# ==============================================================================
# Docker Compose for Personal Site
#
# Services:
#   - ps-frontend:  Next.js frontend application.
#   - ps-directus:  Directus (backend CMS) application.
#   - ps-database:  PostgreSQL database for Directus.
#
# Usage:
#   - Ensure you have a .env file in this directory with all required
#     variables (e.g., ${DB_USER}, ${DIRECTUS_KEY}, etc.).
#   - Ensure your 'backend-net' network is created:
#     docker network create backend-net
#   - Ensure your external Nginx Proxy Manager (which is also
#     on 'backend-net') is configured to route traffic to:
#     - http://ps-frontend:3000 (for the frontend)
#     - http://ps-directus:8055 (for the Directus API/app)
#   - To initialize from a backup, place a .sql file in ./init-db
#     BEFORE the first 'docker compose up'.
#   - Run: docker compose up -d
# ==============================================================================
version: '3.9'

services:
  # 1. Frontend Service (Next.js)
  ps-frontend:
    container_name: ps-frontend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # This passes the public URL to the 'docker build' command.
        # Docker Compose gets the value from the root .env file.
        - NEXT_PUBLIC_DIRECTUS_URL=${NEXT_PUBLIC_DIRECTUS_URL}
    restart: unless-stopped
    expose:
      # Expose port 3000 internally to the backend-net network
      - "3000"
    # --- UPDATED THIS BLOCK ---
    # We now pass variables directly from the root .env file
    # This makes the config consistent with the other services.
    environment:
      - NEXT_PUBLIC_DIRECTUS_URL=${NEXT_PUBLIC_DIRECTUS_URL}
      - DIRECTUS_URL_SERVER_SIDE=${DIRECTUS_URL_SERVER_SIDE}
      # Add any other runtime-only variables for Next.js here
    networks:
      - backend-net
    depends_on:
      ps-directus:
        condition: service_healthy # Wait for Directus to be healthy before starting
    logging: &default-logging # Use a YAML anchor for reusable logging config
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      # This check assumes your Next.js app serves on port 3000.
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s # Give Next.js time to build/start

  # 2. Backend Service (Directus)
  ps-directus:
    image: directus/directus:latest # You could pin this to a specific version
    container_name: ps-directus
    restart: unless-stopped
    expose:
      # Expose port 8055 internally to the backend-net network
      - "8055"
    volumes:
      - ./uploads:/directus/uploads
      - ./extensions:/directus/extensions # Added from your old file
    environment:
      - KEY=${DIRECTUS_KEY}
      - SECRET=${DIRECTUS_SECRET}
      - DB_CLIENT=pg
      - DB_HOST=ps-database # Updated to new service name
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PW}
      - WEBSOCKETS_ENABLED=true
      - PUBLIC_URL=${HTTP_DOMAIN_NAME}
      # --- Added from old file for production ---
      - EXTENSIONS_PATH=/directus/extensions
      - CORS_ENABLED=true
      - CORS_ORIGIN=true # Allows origins based on PUBLIC_URL
      - CORS_ALLOWED_HEADERS=Content-Type,Authorization
    networks:
      - backend-net
    depends_on:
      ps-database:
        condition: service_healthy # Wait for DB to be healthy
    logging: *default-logging # Reuse the logging config
    healthcheck:
        test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:8055/server/info', res => { if (res.statusCode === 200) process.exit(0); else process.exit(1); }).on('error', () => process.exit(1));\""]
        interval: 30s
        timeout: 10s
        retries: 5      # <-- INCREASED from 3
        start_period: 30s # <-- INCREASED from 10s
  # 3. Database Service (PostgreSQL)
  ps-database:
    image: postgres:15-alpine # Using lightweight alpine image
    container_name: ps-database
    restart: unless-stopped
    volumes:
      - db-data:/var/lib/postgresql/data
      # --- ADDED THIS LINE ---
      # Mounts .sql/.sh files into the init directory.
      # These scripts run ONCE when the db-data volume is empty.
      - ./init-db:/docker-entrypoint-initdb.d:ro
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    networks:
      - backend-net
    logging: *default-logging # Reuse the logging config
    healthcheck:
      # Use variables from environment to check if DB is ready
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

# Define the network used by all services
networks:
  backend-net:
    external: true # Assumes you have created this network manually

# Define the persistent volume for the database
volumes:
  db-data:
    name: ps-db-data # Give the volume an explicit name
