# ==============================================================================
# Docker Compose for Personal Site
#
# Services:
#   - ps-frontend:  Next.js frontend application.
#   - ps-directus:  Directus (backend CMS) application.
#   - ps-database:  PostgreSQL database for Directus.
#   - ps-matomo:    Matomo analytics application.
#   - ps-matomo-db: MariaDB database for Matomo.
#
# Usage:
#   - Ensure your .env file is updated with new Matomo DB variables.
#   - Ensure 'backend-net' is created: docker network create backend-net
#   - Configure NPM to route traffic to:
#     - http://ps-frontend:3000 (Frontend)
#     - http://ps-directus:8055 (Directus)
#     - http://ps-matomo:80 (Matomo)
#   - Run: docker compose up -d
# ==============================================================================
version: '3.9'

services:
  # 1. Frontend Service (Next.js)
  ps-frontend:
    container_name: ps-frontend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # This passes the public URL to the 'docker build' command.
        # Docker Compose gets the value from the root .env file.
        - NEXT_PUBLIC_DIRECTUS_URL=${NEXT_PUBLIC_DIRECTUS_URL}
    restart: unless-stopped
    expose:
      # Expose port 3000 internally to the backend-net network
      - "3000"
    # --- UPDATED THIS BLOCK ---
    # We now pass variables directly from the root .env file
    # This makes the config consistent with the other services.
    environment:
      - NEXT_PUBLIC_DIRECTUS_URL=${NEXT_PUBLIC_DIRECTUS_URL}
      - DIRECTUS_URL_SERVER_SIDE=${DIRECTUS_URL_SERVER_SIDE}
      # Add any other runtime-only variables for Next.js here
    networks:
      - backend-net
    depends_on:
      ps-directus:
        condition: service_healthy # Wait for Directus to be healthy before starting
    logging: &default-logging # Use a YAML anchor for reusable logging config
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      # This check assumes your Next.js app serves on port 3000.
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s # Give Next.js time to build/start

  # 2. Backend Service (Directus)
  ps-directus:
    image: directus/directus:latest # You could pin this to a specific version
    container_name: ps-directus
    restart: unless-stopped
    expose:
      # Expose port 8055 internally to the backend-net network
      - "8055"
    volumes:
      - ./uploads:/directus/uploads
      - ./extensions:/directus/extensions # Added from your old file
    environment:
      - KEY=${DIRECTUS_KEY}
      - SECRET=${DIRECTUS_SECRET}
      - DB_CLIENT=pg
      - DB_HOST=ps-database # Updated to new service name
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PW}
      - WEBSOCKETS_ENABLED=true
      - PUBLIC_URL=${HTTP_DOMAIN_NAME}
      # --- Added from old file for production ---
      - EXTENSIONS_PATH=/directus/extensions
      - CORS_ENABLED=true
      - CORS_ORIGIN=true # Allows origins based on PUBLIC_URL
      - CORS_ALLOWED_HEADERS=Content-Type,Authorization
    networks:
      - backend-net
    depends_on:
      ps-database:
        condition: service_healthy # Wait for DB to be healthy
    logging: *default-logging # Reuse the logging config
    healthcheck:
        test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:8055/server/info', res => { if (res.statusCode === 200) process.exit(0); else process.exit(1); }).on('error', () => process.exit(1));\""]
        interval: 30s
        timeout: 10s
        retries: 5      # <-- INCREASED from 3
        start_period: 30s # <-- INCREASED from 10s

  # 3. Database Service (PostgreSQL)
  ps-database:
    image: postgres:15-alpine # Using lightweight alpine image
    container_name: ps-database
    restart: unless-stopped
    volumes:
      - db-data:/var/lib/postgresql/data
      # --- ADDED THIS LINE ---
      # Mounts .sql/.sh files into the init directory.
      # These scripts run ONCE when the db-data volume is empty.
      - ./init-db:/docker-entrypoint-initdb.d:ro
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    networks:
      - backend-net
    logging: *default-logging # Reuse the logging config
    healthcheck:
      # Use variables from environment to check if DB is ready
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # 4. Code Sync Service (Independent - can run without other services)
  # This service polls GitHub for updates and syncs code to the repo.
  # It can be paused/resumed and runs independently of the main stack.
  ps-sync:
    container_name: ps-sync
    build:
      context: ./sync-service
      dockerfile: Dockerfile
    restart: unless-stopped
    # NO depends_on - this service runs independently
    volumes:
      # Mount the repository directory so sync can pull code
      - .:/app/repo:rw
      # Persistent flags directory for pause/resume state
      - sync-flags:/app/flags
    environment:
      # Repository configuration
      - GITHUB_REPO=${GITHUB_REPO:-}  # e.g., "username/personal-site"
      - BRANCH=${SYNC_BRANCH:-main}
      - REPO_PATH=/app/repo
      # Sync mode: 'poll' (default, works with restrictive firewall) or 'webhook'
      - SYNC_MODE=${SYNC_MODE:-poll}
      # Polling configuration (only used in poll mode)
      - POLL_INTERVAL=${POLL_INTERVAL:-300}  # 5 minutes default
      # Webhook configuration (only used in webhook mode)
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
      - WEBHOOK_PORT=8080
      - ADMIN_TOKEN=${SYNC_ADMIN_TOKEN:-}  # For pause/resume API
    # Optional: expose webhook port if using webhook mode
    # expose:
    #   - "8080"
    # networks:
    #   - backend-net  # Only needed if exposing webhook via NPM
    logging: *default-logging
    # Health check for webhook mode
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # 5. Analytics Service (Matomo App)
  ps-matomo:
    image: matomo:latest
    container_name: ps-matomo
    restart: unless-stopped
    expose:
      - "80" # Matomo runs on port 80 internally
    volumes:
      - matomo-app-data:/var/www/html
    environment:
      - MATOMO_DATABASE_ADAPTER=mysql
      - MATOMO_DATABASE_HOST=ps-matomo-db
      - MATOMO_DATABASE_DBNAME=matomo
      - MATOMO_DATABASE_USERNAME=matomo
      - MATOMO_DATABASE_PASSWORD=${MATOMO_DB_PASSWORD}
    networks:
      - backend-net
    depends_on:
      ps-matomo-db:
        condition: service_healthy
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # 6. Analytics Database (MariaDB for Matomo)
  ps-matomo-db:
    image: mariadb:10
    container_name: ps-matomo-db
    restart: unless-stopped
    volumes:
      - matomo-db-data:/var/lib/mysql
    environment:
      - MYSQL_DATABASE=matomo
      - MYSQL_USER=matomo
      - MYSQL_PASSWORD=${MATOMO_DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MATOMO_DB_ROOT_PASSWORD}
    networks:
      - backend-net
    logging: *default-logging
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MATOMO_DB_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

# Define the network used by all services
networks:
  backend-net:
    external: true # Assumes you have created this network manually

# Define the persistent volume for the database
volumes:
  db-data:
    name: ps-db-data # Give the volume an explicit name
  sync-flags:
    name: ps-sync-flags # Persistent flags for sync service pause/resume stat
  matomo-db-data:
    name: ps-matomo-db-data
  matomo-app-data:
    name: ps-matomo-app-data
